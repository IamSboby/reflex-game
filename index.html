<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#25272b"><title>Reflex</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="effects.css"><link rel="stylesheet" href="mobile.css"><link rel="stylesheet" href="countdown.css"><link rel="stylesheet" href="fixes.css"><link rel="stylesheet" href="error-feedback.css"><link rel="stylesheet" href="slider-effects.css"></head><body>
<main id="app"><section id="menu" class="screen active"><button id="open" class="icon gear" aria-label="Settings">⚙</button><div class="menu"><p class="over">REFLEX</p><h1>Press any arrow<br>to start</h1><div class="duration"><label for="duration">Duration <output id="durationText">1 min</output></label><input id="duration" type="range" min="10" max="300" step="5" value="60"><small><span>10 sec</span><span>5 min</span></small></div><button id="touchStart" class="touch-start">Start game</button><p class="hint"><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> Keyboard or continuous swipe</p></div></section>
<section id="countdown" class="screen"><div class="count-stage"><div class="count-rings"><i></i><i></i><i></i></div><strong id="count">3</strong><small id="countHint">GET READY</small></div></section>
<section id="game" class="screen"><div id="colorWash" class="color-wash" aria-hidden="true"></div><div id="bgPulse" class="bg-pulse"></div><div id="particles" class="particles"></div><header><span id="timer">1:00</span><span id="live">0 · 0 ms</span></header><div id="arrowShell"><div id="arrow" data-dir="right" aria-live="assertive" aria-label="Right arrow"><svg viewBox="0 0 100 100" role="presentation" focusable="false"><path d="M14 50H78M52 24L79 50 52 76"/></svg></div></div><div id="feedbackPop" aria-hidden="true">NICE</div></section>
<section id="results" class="screen scroll"><div class="results"><p class="over">RUN COMPLETE</p><h2><span id="score">0</span><small>points</small></h2><div id="summary" class="grid"></div><div class="chart"><label>Progress <small>reaction time (ms)</small></label><canvas id="canvas" aria-label="Reaction-time progress"></canvas></div><div id="directions" class="grid directions"></div><footer><button id="replay" class="primary">Play again</button><button id="back">Main menu</button></footer></div></section></main>
<div id="backdrop" hidden><aside role="dialog" aria-modal="true" aria-labelledby="settingsTitle"><header><div><p class="over">PREFERENCES</p><h2 id="settingsTitle">Settings</h2></div><button id="close" class="icon" aria-label="Close">×</button></header><div class="settings"><fieldset><legend>Controls</legend><p class="note">Select a field, then press the new key.</p><div id="keys"></div><p id="warning" class="warning" hidden>This key is already assigned.</p><button id="resetKeys" class="link">Reset controls</button></fieldset><fieldset><legend>Colors</legend><div id="colors"></div><button id="resetColors" class="link">Reset colors</button></fieldset><fieldset><legend>Options</legend><label class="toggle">Tint arrows darker<input id="darkArrows" type="checkbox"><i></i></label><label class="toggle">Enhanced animations<input id="motion" type="checkbox"><i></i></label><label class="toggle">Visual error feedback<input id="feedback" type="checkbox"><i></i></label><label class="toggle">Show live performance<input id="performance" type="checkbox"><i></i></label></fieldset><button id="resetAll" class="danger">Reset all settings</button></div></aside></div>
<script src="app.js"></script></body></html>
